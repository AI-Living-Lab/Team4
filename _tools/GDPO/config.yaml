# ============================================================
# GDPO v2 Training Configuration
# set -a && source paths.env && set +a
# python "_tools/GDPO_v2(revised)/gdpo_trainer.py" --config "_tools/GDPO_v2(revised)/config.yaml"
# ============================================================

# 모델 설정
model:
  model_path: ${SFT_CKPT}                    # SFT 체크포인트 경로
  model_base: ${BASE_MODEL}                  # 베이스 모델 (로컬 경로 또는 HF ID)
  # 로컬 다운로드 사용 시 아래처럼 변경:
  # model_base: /workspace/models/llava-onevision-qwen2-7b-ov

# 데이터 설정
data:
  dataset_path: data/unav100_train_gdpo.json

# GDPO 설정
gdpo:
  num_generations: 4                        # 프롬프트당 생성 수
  max_completion_length: 1024                # 생성 최대 토큰 수
  beta: 0.04                                 # KL 페널티 계수
  temperature: 1.0                           # 샘플링 온도
  reward_weights: [0.1, 0.3, 0.6]           # [format, label, iou]

# 학습 설정
training:
  output_dir: output/gdpo_v2
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5e-6
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  bf16: true
  seed: 2024
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false

# 저장/로깅
logging:
  logging_steps: 1
  save_steps: 500
  save_total_limit: 3
  report_to: tensorboard

# ref 모델
ref_model:
  enabled: true                              # false면 KL=0 (메모리 절약)
