# ============================================================
# GDPO Training Configuration (VS2+ / Qwen2.5-VL)
# set -a && source paths.env && set +a
# python _tools/GDPO_revised/gdpo_trainer.py --config _tools/GDPO_revised/config.yaml
# ============================================================

# 모델 설정
model:
  model_path: ${SFT_CKPT}                    # SFT 체크포인트 경로
  model_base: ${BASE_MODEL}                  # VS2+ 베이스 모델 (3B or 7B)
  # 3B: tsinghua-ee/video-SALMONN-2_plus_3B
  # 7B: tsinghua-ee/video-SALMONN-2_plus_7B

# 데이터 설정
data:
  dataset_path: data/sample.json

# GDPO 설정
gdpo:
  num_generations: 8                      # 8
  max_completion_length: 256              # 512
  beta: 0.04                               # 0.04
  temperature: 1.0
  reward_weights: [1.0, 1.0]           # [format, iou]

# 학습 설정
training:
  output_dir: output/gdpo_vs2plus
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5e-6
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  bf16: true
  seed: 2024
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false

# 저장/로깅
logging:
  logging_steps: 1
  save_steps: 500
  save_total_limit: 3
  report_to: tensorboard

# ref 모델
ref_model:
  enabled: true
